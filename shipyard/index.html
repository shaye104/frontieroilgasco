<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <meta name="theme-color" content="#112d72" /><meta name="description" content="Codswallop Shipyard configuration." />
    <title>Codswallop | Shipyard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/tokens.css" />
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/pages.css" />
  </head>
  <body class="page page-intranet page-shipyard">
    <header class="site-header">
      <div class="container header-row">
        <a class="brand" href="/">
          <span class="brand-mark brand-mark-image" aria-hidden="true"><img src="/assets/brand/frontierlogo.svg?v=20260325fix" alt="" /></span>
          <span class="brand-text">Codswallop</span>
        </a>
        <nav class="site-nav" aria-label="Primary"></nav>
        <button type="button" class="btn btn-secondary site-theme-toggle btn-theme-toggle" aria-pressed="false">Dark Mode</button>
      </div>
    </header>

    <main class="section">
      <div class="container intranet-layout">
        <section id="guardFeedback" class="feedback" role="status" aria-live="polite"></section>
        <section id="protectedContent" class="hidden">
          <article class="panel fleet-header-panel">
            <div class="admin-employees-table-header fleet-header-row">
              <div>
                <h1>Shipyard</h1>
                <p class="finance-inline-caption">Configure ships once, then assign crew from Fleet.</p>
              </div>
              <div class="button-row">
                <a class="btn btn-secondary btn-compact" href="/fleet">Back to Fleet</a>
              </div>
            </div>
          </article>

          <section id="shipyardFeedback" class="feedback" role="status" aria-live="polite"></section>

          <article class="panel shipyard-panel">
            <div class="shipyard-head">
              <form id="shipyardCreateForm" class="shipyard-form" autocomplete="off">
                <label>
                  <span>Ship Name</span>
                  <input name="shipName" type="text" placeholder="FN Example" required />
                </label>
                <label>
                  <span>Vessel Class</span>
                  <input name="vesselClass" type="text" placeholder="Marlin 130" required />
                </label>
                <div class="shipyard-form-actions">
                  <button class="btn btn-primary" type="submit">Add Ship</button>
                </div>
              </form>
            </div>
            <section id="shipyardList"></section>
          </article>
        </section>
      </div>
    </main>

    <script type="module" src="/assets/js/pages/shipyard-page.js?v=20260308d"></script>
      <script>
      (function () {
        var KEY = 'frontier:theme-preference';

        function currentTheme() {
          try {
            return localStorage.getItem(KEY) === 'dark' ? 'dark' : 'light';
          } catch {
            return 'light';
          }
        }

        function applyTheme(theme) {
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
          document.body && document.body.setAttribute('data-theme', theme);
          var themeColor = document.querySelector('meta[name="theme-color"]');
          if (themeColor) themeColor.setAttribute('content', theme === 'dark' ? '#08111f' : '#112d72');
        }

        function updateButton(button, theme) {
          if (!button) return;
          var isDark = theme === 'dark';
          button.textContent = isDark ? 'Light Mode' : 'Dark Mode';
          button.title = isDark ? 'Switch to light mode' : 'Switch to dark mode';
          button.setAttribute('aria-pressed', isDark ? 'true' : 'false');
        }

        function ensureToggle() {
          var button = document.querySelector('.site-theme-toggle') || document.querySelector('.btn-theme-toggle');
          if (!button) return;
          if (button.dataset.themeBound !== '1') {
            button.dataset.themeBound = '1';
            button.addEventListener('click', function () {
              var next = currentTheme() === 'dark' ? 'light' : 'dark';
              try {
                localStorage.setItem(KEY, next);
              } catch {}
              applyTheme(next);
              updateButton(button, next);
            });
          }
          updateButton(button, currentTheme());
        }

        applyTheme(currentTheme());
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', ensureToggle, { once: true });
        } else {
          ensureToggle();
        }
        new MutationObserver(ensureToggle).observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
