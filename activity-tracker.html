<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Frontier Oil & Gas Company activity tracker." />
    <title>Frontier Oil & Gas Company | Activity Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&display=swap" rel="stylesheet" />



      <link rel="stylesheet" href="/assets/dist/css/app.bundle.css?v=20260327032909" />
  </head>
  <body class="page page-intranet">
    <header class="site-header">
      <div class="container header-row">
        <a class="brand" href="/">
          <span class="brand-mark brand-mark-image" aria-hidden="true"><img src="/assets/brand/frontierlogo.svg?v=20260325fix" alt="" loading="eager" decoding="async" /></span>
          <span class="brand-text">Frontier Oil &amp; Gas Company</span>
        </a>
        <nav class="site-nav" aria-label="Primary"></nav>
      </div>
    </header>

    <main class="section">
      <div class="container intranet-layout intranet-page-shell">
        <section class="panel my-details-page-header">
          <div>
            <h1>Activity Tracker</h1>
            <p class="my-details-subtitle">Employee voyage activity and quota tracking.</p>
          </div>
          <div class="button-row">
            <a class="btn btn-secondary" href="/admin/employees">Back to Employees</a>
            <button id="activityExportCsvBtn" class="btn btn-primary" type="button">Export CSV</button>
          </div>
          <div id="guardFeedback" class="feedback" role="status" aria-live="polite"></div>
          <div id="activityTrackerFeedback" class="feedback" role="status" aria-live="polite"></div>
        </section>

        <section id="protectedContent" class="hidden admin-employees-stack">
          <article class="panel">
            <div class="button-row" style="margin-top: 0; margin-bottom: 1rem;">
              <button class="btn btn-secondary" type="button" data-activity-preset="review">Needs Review</button>
              <button class="btn btn-secondary" type="button" data-activity-preset="no_voyages">No Voyages</button>
              <button class="btn btn-secondary" type="button" data-activity-preset="on_track">On Track</button>
              <button class="btn btn-secondary" type="button" data-activity-preset="all_active">All Active</button>
            </div>
            <div id="activitySummaryGrid" class="card-grid" style="margin-bottom: 1rem;"></div>
            <div class="admin-employees-filter-main">
              <div>
                <label for="activitySearch">Search</label>
                <input id="activitySearch" type="text" placeholder="Username or Roblox ID" />
              </div>
              <div>
                <label for="activityQuotaTarget">Quota Target</label>
                <input id="activityQuotaTarget" type="number" min="1" step="1" placeholder="e.g. 4" />
              </div>
              <div>
                <label for="activityMinVoyages">Minimum Voyages (Advanced)</label>
                <input id="activityMinVoyages" type="number" min="0" step="1" placeholder="e.g. 4" />
              </div>
              <div>
                <label for="activityQuotaFilter">Quota Filter</label>
                <select id="activityQuotaFilter">
                  <option value="">All</option>
                  <option value="met">Met quota</option>
                  <option value="not_met">Not met</option>
                </select>
              </div>
              <div>
                <label for="activityDateFrom">Date From</label>
                <input id="activityDateFrom" type="date" />
              </div>
              <div>
                <label for="activityDateTo">Date To</label>
                <input id="activityDateTo" type="date" />
              </div>
              <div>
                <label for="activityActiveOnly">Scope</label>
                <label style="display:flex; align-items:center; gap:.5rem; margin-top:.75rem;">
                  <input id="activityActiveOnly" type="checkbox" checked style="width:auto; margin:0;" />
                  <span>Active staff only</span>
                </label>
              </div>
            </div>
          </article>

          <article class="panel">
            <div class="table-wrap">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Username</th>
                    <th>Rank</th>
                    <th>Status</th>
                    <th>Completed</th>
                    <th>Target</th>
                    <th>Shortfall</th>
                    <th>OOTW / Crew</th>
                    <th>Last Ended Voyage</th>
                    <th>Days Idle</th>
                    <th>Recommendation</th>
                  </tr>
                </thead>
                <tbody id="activityTrackerBody"></tbody>
              </table>
            </div>
            <div class="pagination-row">
              <div class="button-row">
                <button id="activityPrevPageBtn" class="btn btn-secondary" type="button">Previous</button>
                <button id="activityNextPageBtn" class="btn btn-secondary" type="button">Next</button>
              </div>
              <span id="activityPaginationInfo" class="pagination-info">Page 1 of 1</span>
            </div>
          </article>
        </section>
      </div>
    </main>
    <script type="module" src="/assets/js/pages/activity-tracker-page.js?v=20260404a"></script>
  </body>
</html>
