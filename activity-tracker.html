<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Frontier admin activity tracker." />
    <title>Frontier Oil & Gas Company | Activity Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/tokens.css" />
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/pages.css" />
  </head>
  <body class="page page-intranet">
    <header class="site-header">
      <div class="container header-row">
        <a class="brand" href="/">
          <span class="brand-mark" aria-hidden="true">FOG</span>
          <span class="brand-text">Frontier Oil & Gas Company</span>
        </a>
        <nav class="site-nav" aria-label="Primary"></nav>
      </div>
    </header>

    <main class="section">
      <div class="container intranet-layout intranet-page-shell">
        <section class="panel my-details-page-header">
          <div>
            <h1>Activity Tracker</h1>
            <p class="my-details-subtitle">Global admin actions and employee event history.</p>
          </div>
          <div class="button-row">
            <a class="btn btn-secondary" href="/admin/employees">Back to Employees</a>
            <button id="activityExportCsvBtn" class="btn btn-primary" type="button">Export CSV</button>
          </div>
          <div id="guardFeedback" class="feedback" role="status" aria-live="polite"></div>
          <div id="activityTrackerFeedback" class="feedback" role="status" aria-live="polite"></div>
        </section>

        <section id="protectedContent" class="hidden admin-employees-stack">
          <article class="panel">
            <div class="admin-employees-filter-main">
              <div>
                <label for="activitySearch">Search</label>
                <input id="activitySearch" type="text" placeholder="Summary, actor, target employee" />
              </div>
              <div>
                <label for="activityActionType">Action Type</label>
                <input id="activityActionType" type="text" placeholder="EMPLOYEE_UPDATED" />
              </div>
              <div>
                <label for="activityActor">Actor</label>
                <input id="activityActor" type="text" placeholder="Name or Discord ID" />
              </div>
              <div>
                <label for="activityTargetEmployeeId">Target Employee ID</label>
                <input id="activityTargetEmployeeId" type="number" min="1" step="1" />
              </div>
              <div>
                <label for="activityDateFrom">Date From</label>
                <input id="activityDateFrom" type="date" />
              </div>
              <div>
                <label for="activityDateTo">Date To</label>
                <input id="activityDateTo" type="date" />
              </div>
            </div>
          </article>

          <article class="panel">
            <div class="table-wrap">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Timestamp</th>
                    <th>Action</th>
                    <th>Actor</th>
                    <th>Target Employee</th>
                    <th>Summary</th>
                  </tr>
                </thead>
                <tbody id="activityTrackerBody"></tbody>
              </table>
            </div>
            <div class="pagination-row">
              <div class="button-row">
                <button id="activityPrevPageBtn" class="btn btn-secondary" type="button">Previous</button>
                <button id="activityNextPageBtn" class="btn btn-secondary" type="button">Next</button>
              </div>
              <span id="activityPaginationInfo" class="pagination-info">Page 1 of 1</span>
            </div>
          </article>
        </section>
      </div>
    </main>
    <script type="module" src="/assets/js/pages/activity-tracker-page.js?v=20260225a"></script>
  </body>
</html>
