<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Frontier user ranks management." />
    <title>Frontier Oil & Gas Company | User Ranks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/tokens.css" />
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/pages.css" />
  </head>
  <body class="page page-intranet">
    <header class="site-header">
      <div class="container header-row">
        <a class="brand" href="/">
          <span class="brand-mark" aria-hidden="true">FOG</span>
          <span class="brand-text">Frontier Oil & Gas Company</span>
        </a>
        <nav class="site-nav" aria-label="Primary"></nav>
      </div>
    </header>

    <main class="section">
      <div class="container intranet-layout">
        <section class="panel">
          <div class="modal-header">
            <h1>User Ranks</h1>
            <a class="btn btn-secondary" href="admin-panel.html">&larr; Back to Admin Panel</a>
          </div>
          <div id="guardFeedback" class="feedback" role="status" aria-live="polite"></div>
          <div id="userRanksFeedback" class="feedback" role="status" aria-live="polite"></div>
        </section>

        <section id="protectedContent" class="hidden">
          <article class="panel user-ranks-layout">
            <section class="user-ranks-sidebar">
              <div class="user-ranks-sidebar-head">
                <h2>Ranks</h2>
                <button id="openCreateRankBtn" class="btn btn-primary" type="button">+ New Rank</button>
              </div>
              <input id="userRanksSearchInput" type="search" placeholder="Search ranks..." />
              <ul id="userRanksList" class="role-list"></ul>
            </section>

            <section class="user-ranks-editor">
              <p id="userRanksHint">Select a rank to edit overview, links, and permissions.</p>
              <div id="userRanksEditorShell" class="hidden">
                <div class="user-ranks-editor-head">
                  <h2 id="userRanksEditorTitle">Rank Editor</h2>
                  <div class="modal-actions">
                    <button id="deleteUserRankBtn" class="btn btn-danger" type="button">Delete Rank</button>
                  </div>
                </div>

                <div class="finance-tabs user-ranks-tabs" id="userRanksTabs">
                  <button class="finance-tab is-active" type="button" data-rank-tab="overview">Overview</button>
                  <button class="finance-tab" type="button" data-rank-tab="links">Links</button>
                  <button class="finance-tab" type="button" data-rank-tab="permissions">Permissions</button>
                </div>

                <div id="userRanksTabPanels">
                  <section class="user-ranks-tab-panel" data-rank-panel="overview">
                    <form id="userRanksDetailsForm">
                      <input type="hidden" name="id" />
                      <label>Rank Name</label>
                      <input name="value" type="text" required />
                      <label>Rank Level</label>
                      <input name="level" type="number" step="1" required />
                      <label>Description</label>
                      <textarea name="description" rows="3" placeholder="Optional description"></textarea>
                      <div class="modal-actions">
                        <button class="btn btn-primary" type="submit">Save Rank</button>
                      </div>
                    </form>
                  </section>

                  <section class="user-ranks-tab-panel hidden" data-rank-panel="links">
                    <div class="user-ranks-links-grid">
                      <article class="panel section-surface">
                        <h3>Discord Role Links</h3>
                        <form id="userRankDiscordLinkForm" class="filter-row">
                          <div>
                            <label>Discord Role ID</label>
                            <input name="discordRoleId" type="text" inputmode="numeric" placeholder="123456789012345678" required />
                          </div>
                          <div>
                            <label>Role Name (optional)</label>
                            <input name="discordRoleName" type="text" placeholder="Cached role name" />
                          </div>
                          <div class="modal-actions">
                            <button class="btn btn-secondary" type="submit">Add Discord Link</button>
                          </div>
                        </form>
                        <div id="userRankDiscordLinksList" class="table-wrap"></div>
                      </article>

                      <article class="panel section-surface">
                        <h3>Website User Group Links</h3>
                        <form id="userRankGroupLinkForm" class="filter-row">
                          <div>
                            <label>User Group</label>
                            <select name="groupKey" id="userRankGroupKeySelect"></select>
                          </div>
                          <div class="modal-actions">
                            <button class="btn btn-secondary" type="submit">Add Group Link</button>
                          </div>
                        </form>
                        <div id="userRankGroupLinksList" class="table-wrap"></div>
                      </article>
                    </div>
                  </section>

                  <section class="user-ranks-tab-panel hidden" data-rank-panel="permissions">
                    <div class="filter-row">
                      <div>
                        <label>Search permissions</label>
                        <input id="userRanksPermissionsSearch" type="search" placeholder="Search permissions..." />
                      </div>
                    </div>
                    <div id="userRanksPermissionsEditor" class="permissions-grid"></div>
                    <div class="modal-actions rank-permissions-actions">
                      <button id="saveUserRanksPermissionsBtn" class="btn btn-primary" type="button">Save Permissions</button>
                    </div>
                  </section>
                </div>
              </div>
            </section>
          </article>
        </section>
      </div>
    </main>

    <section id="createUserRankModal" class="modal-overlay hidden" aria-hidden="true">
      <div class="modal-card">
        <div class="modal-header">
          <h2>Create Rank</h2>
          <button class="btn btn-secondary" type="button" data-close-modal="createUserRankModal">Close</button>
        </div>
        <form id="createUserRankForm">
          <label>Rank Name</label>
          <input name="value" type="text" required />
          <label>Rank Level</label>
          <input name="level" type="number" step="1" required />
          <label>Start with template (optional)</label>
          <select name="template">
            <option value="">None</option>
            <option value="viewer">Viewer</option>
            <option value="staff">Staff</option>
            <option value="manager">Manager</option>
            <option value="admin">Admin</option>
          </select>
          <div class="modal-actions">
            <button class="btn btn-primary" type="submit">Create Rank</button>
            <button class="btn btn-secondary" type="button" data-close-modal="createUserRankModal">Cancel</button>
          </div>
        </form>
      </div>
    </section>
    <script type="module" src="/assets/js/pages/user-ranks-page.js?v=20260226a"></script>
  </body>
</html>
