    <script>
      (function () {
        try {
          var theme = localStorage.getItem('frontier:theme-preference');
          if (theme !== 'dark' && theme !== 'light') theme = 'light';
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
          var themeColor = document.querySelector('meta[name="theme-color"]');
          if (themeColor) themeColor.setAttribute('content', theme === 'dark' ? '#08111f' : '#112d72');
          var brandLogos = document.querySelectorAll('.brand-mark-image img');
          brandLogos.forEach(function (logo) {
            logo.src = theme === 'dark' ? '/assets/brand/frontierdarkmode.png?v=20260413a' : '/assets/brand/frontierlogo.svg?v=20260325fix';
          });
        } catch {}

    <script>
      (function () {
        var FLEET_API_PATH = '/api/fleet/leaderboard';
        var SHIPYARD_API_PATH = '/api/shipyard?includeInactive=0';
        var originalFetch = window.fetch.bind(window);
        var activeShipCatalogPromise = null;

        function normalizePart(value) {
          return String(value || '').trim().toLowerCase();
        }

        function shipIdentity(row) {
          return [
            normalizePart(row && (row.ship_name || row.vesselName)),
            normalizePart(row && (row.vessel_callsign || row.vesselCallsign)),
            normalizePart(row && (row.vessel_class || row.vesselClass))
          ].join('::');
        }

        function buildJsonResponse(sourceResponse, payload) {
          var headers = new Headers(sourceResponse.headers);
          headers.set('content-type', 'application/json; charset=utf-8');
          return new Response(JSON.stringify(payload), {
            status: sourceResponse.status,
            statusText: sourceResponse.statusText,
            headers: headers
          });
        }

        function isGhostShip(ship) {
          var employees = Array.isArray(ship && ship.employees) ? ship.employees.length : 0;
          var voyages = Number(ship && ship.shipTotalVoyages || 0);
          var earnings = Number(ship && ship.shipTotalProfit || 0);
          return employees <= 0 && voyages <= 0 && earnings <= 0;
        }

        function dedupeShips(ships) {
          var byIdentity = new Map();
          (Array.isArray(ships) ? ships : []).forEach(function (ship) {
            var key = shipIdentity(ship);
            if (!key) return;
            var existing = byIdentity.get(key);
            if (!existing) {
              byIdentity.set(key, ship);
              return;
            }
            var existingScore =
              Number(existing && existing.shipTotalVoyages || 0) +
              Number(existing && existing.shipTotalProfit || 0) +
              (Array.isArray(existing && existing.employees) ? existing.employees.length : 0);
            var nextScore =
              Number(ship && ship.shipTotalVoyages || 0) +
              Number(ship && ship.shipTotalProfit || 0) +
              (Array.isArray(ship && ship.employees) ? ship.employees.length : 0);
            if (nextScore >= existingScore) {
              byIdentity.set(key, ship);
            }
          });
          return Array.from(byIdentity.values());
        }

        function getActiveShipCatalog() {
          if (!activeShipCatalogPromise) {
            activeShipCatalogPromise = originalFetch(SHIPYARD_API_PATH, { credentials: 'include' })
              .then(function (response) { return response.json(); })
              .then(function (payload) {
                var ships = Array.isArray(payload && payload.ships) ? payload.ships : [];
                return {
                  identities: new Set(ships.map(shipIdentity).filter(Boolean)),
                  ids: new Set(
                    ships
                      .map(function (ship) { return Number(ship && ship.id || 0); })
                      .filter(function (id) { return id > 0; })
                  )
                };
              })
              .catch(function () { return null; });
          }
          return activeShipCatalogPromise;
        }

        function recalcTotals(payload) {
          var ships = Array.isArray(payload && payload.ships) ? payload.ships : [];
          payload.totals = Object.assign({}, payload.totals || {}, {
            totalShips: ships.length,
            totalEmployeesAssigned: ships.reduce(function (sum, ship) {
              return sum + Number((ship && ship.employees || []).length);
            }, 0),
            fleetTotalProfit: ships.reduce(function (sum, ship) {
              return sum + Number(ship && ship.shipTotalProfit || 0);
            }, 0)
          });
          return payload;
        }

        window.fetch = async function frontierFleetFixes(input, init) {
          var response = await originalFetch(input, init);
          try {
            var url = new URL(typeof input === 'string' ? input : input.url, window.location.origin);
            if (url.pathname !== FLEET_API_PATH) return response;

            var payload = await response.clone().json();
            var activeShipCatalog = await getActiveShipCatalog();
            var ships = Array.isArray(payload && payload.ships) ? payload.ships : [];

            if (activeShipCatalog && (activeShipCatalog.ids.size || activeShipCatalog.identities.size)) {
              payload.ships = ships.filter(function (ship) {
                var shipId = Number(ship && ship.shipId || 0);
                if (shipId > 0 && activeShipCatalog.ids.has(shipId)) return !isGhostShip(ship);
                return activeShipCatalog.identities.has(shipIdentity(ship)) && !isGhostShip(ship);
              });
            } else {
              payload.ships = ships.filter(function (ship) {
                return Number(ship && ship.shipId || 0) > 0 && !isGhostShip(ship);
              });
            }

            payload.ships = dedupeShips(payload.ships);

            return buildJsonResponse(response, recalcTotals(payload));
          } catch (error) {
            return response;
          }
        };
      })();
    </script>

    <script>
      (function () {
        var KEY = 'frontier:theme-preference';

        function currentTheme() {
          try {
            return localStorage.getItem(KEY) === 'dark' ? 'dark' : 'light';
          } catch {
            return 'light';
          }
        }

        function applyTheme(theme) {
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
          document.body && document.body.setAttribute('data-theme', theme);
          var themeColor = document.querySelector('meta[name="theme-color"]');
          if (themeColor) themeColor.setAttribute('content', theme === 'dark' ? '#08111f' : '#112d72');
          var brandLogos = document.querySelectorAll('.brand-mark-image img');
          brandLogos.forEach(function (logo) {
            logo.src = theme === 'dark' ? '/assets/brand/frontierdarkmode.png?v=20260413a' : '/assets/brand/frontierlogo.svg?v=20260325fix';
          });
        }

                function updateButton(button, theme) {
          if (!button) return;
          var isDark = theme === 'dark';
          button.innerHTML = isDark
            ? '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>'
            : '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"></path></svg>';
          button.title = isDark ? 'Switch to light mode' : 'Switch to dark mode';
          button.setAttribute('aria-label', button.title);
          button.setAttribute('aria-pressed', isDark ? 'true' : 'false');
        }

        function ensureToggle() {
          var button = document.querySelector('.site-theme-toggle') || document.querySelector('.btn-theme-toggle');
          if (!button) return;
          if (button.dataset.themeBound !== '1') {
            button.dataset.themeBound = '1';
            button.addEventListener('click', function () {
              var next = currentTheme() === 'dark' ? 'light' : 'dark';
              try {
                localStorage.setItem(KEY, next);
              } catch {}
              applyTheme(next);
              updateButton(button, next);
            });
          }
          updateButton(button, currentTheme());
        }

        applyTheme(currentTheme());
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function () { applyTheme(currentTheme()); ensureToggle(); }, { once: true });
        } else {
          applyTheme(currentTheme());
          ensureToggle();
        }
      })();
    </script>
