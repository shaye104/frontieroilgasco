<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <meta name="theme-color" content="#112d72" /><meta name="description" content="Codswallop fleet leaderboard and ship assignments." />
    <title>Codswallop | Fleet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/tokens.css" />
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/pages.css" />
  </head>
  <body class="page page-intranet page-fleet">
    <header class="site-header">
      <div class="container header-row">
        <a class="brand" href="/">
          <span class="brand-mark brand-mark-image" aria-hidden="true"><img src="/assets/brand/frontierlogo.svg?v=20260325fix" alt="" /></span>
          <span class="brand-text">Codswallop</span>
        </a>
        <nav class="site-nav" aria-label="Primary"></nav>
      </div>
    </header>

    <main class="section">
      <div class="container intranet-layout">
        <section id="guardFeedback" class="feedback" role="status" aria-live="polite"></section>
        <section id="protectedContent" class="hidden">
          <article class="panel fleet-header-panel">
            <div class="admin-employees-table-header fleet-header-row">
              <div>
                <h1>Fleet Leaderboard</h1>
                <p class="finance-inline-caption">Breakdown by ship assignment with crew performance totals.</p>
              </div>
              <div class="button-row">
                <button id="fleetToggleEmptyShipsBtn" class="btn btn-secondary btn-compact" type="button">Show Empty Ships</button>
                <a class="btn btn-secondary btn-compact" href="/shipyard">Manage Ships</a>
              </div>
            </div>
          </article>
          <section id="fleetFeedback" class="feedback" role="status" aria-live="polite"></section>
          <section id="fleetTotals" class="metric-grid"></section>
          <section id="fleetShips" class="stack"></section>
        </section>
      </div>
    </main>

    <section id="fleetDrawerModal" class="modal-overlay hidden" aria-hidden="true">
      <div class="modal-card" style="width:min(1400px,95vw);height:min(900px,92vh);padding:0;">
        <div class="modal-header" style="padding:0.8rem 1rem;">
          <h2>Employee Drawer</h2>
          <button id="fleetDrawerClose" class="btn btn-secondary" type="button">Close</button>
        </div>
        <iframe id="fleetDrawerFrame" title="Employee Drawer" style="width:100%;height:calc(100% - 60px);border:0;" src="about:blank"></iframe>
      </div>
    </section>

    <section id="fleetShipModal" class="modal-overlay hidden" aria-hidden="true">
      <div class="modal-card fleet-ship-modal-card">
        <div class="modal-header">
          <h2 id="fleetShipModalTitle">Ship</h2>
          <button id="fleetShipModalClose" class="btn btn-secondary" type="button">Close</button>
        </div>
        <div id="fleetShipModalBody" class="fleet-ship-modal-body"></div>
      </div>
    </section>

    <script type="module" src="/assets/js/pages/fleet-page.js?v=20260308f"></script>
      <script>
      (function () {
        var KEY = 'frontier:theme-preference';

        function currentTheme() {
          try {
            return localStorage.getItem(KEY) === 'dark' ? 'dark' : 'light';
          } catch {
            return 'light';
          }
        }

        function applyTheme(theme) {
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
          document.body && document.body.setAttribute('data-theme', theme);
          var themeColor = document.querySelector('meta[name="theme-color"]');
          if (themeColor) themeColor.setAttribute('content', theme === 'dark' ? '#08111f' : '#112d72');
        }

        function updateButton(button, theme) {
          if (!button) return;
          var isDark = theme === 'dark';
          button.textContent = isDark ? 'Light Mode' : 'Dark Mode';
          button.title = isDark ? 'Switch to light mode' : 'Switch to dark mode';
          button.setAttribute('aria-pressed', isDark ? 'true' : 'false');
        }

        function ensureToggle() {
          var nav = document.querySelector('.site-nav');
          if (!nav) return;
          var button = nav.querySelector('.btn-theme-toggle');
          if (!button) {
            button = document.createElement('button');
            button.type = 'button';
            button.className = 'btn btn-secondary btn-theme-toggle';
            var logout = nav.querySelector('.nav-logout-btn') || nav.querySelector('button.btn.btn-secondary');
            if (logout && logout.nextSibling) nav.insertBefore(button, logout.nextSibling);
            else nav.appendChild(button);
            button.addEventListener('click', function () {
              var next = currentTheme() === 'dark' ? 'light' : 'dark';
              try {
                localStorage.setItem(KEY, next);
              } catch {}
              applyTheme(next);
              updateButton(button, next);
            });
          }
          updateButton(button, currentTheme());
        }

        applyTheme(currentTheme());
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', ensureToggle, { once: true });
        } else {
          ensureToggle();
        }
        new MutationObserver(ensureToggle).observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
  </body>
  </html>
