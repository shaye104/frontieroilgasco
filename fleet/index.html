<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <meta name="theme-color" content="#112d72" />
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('frontier:theme-preference');
          if (theme !== 'dark' && theme !== 'light') theme = 'light';
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
          var themeColor = document.querySelector('meta[name="theme-color"]');
          if (themeColor) themeColor.setAttribute('content', theme === 'dark' ? '#08111f' : '#112d72');
        } catch {}
      })();
    </script>
    <style>
      html[data-theme='dark'] {
        --color-bg: #08111f;
        --color-surface: #0f1b2d;
        --color-surface-soft: #15243a;
        --color-ink: #e6edf7;
        --color-ink-soft: #c5d1e0;
        --color-muted: #98abc2;
        --color-primary: #67a4ff;
        --color-primary-strong: #08111f;
        --color-secondary: #7db0ff;
        --color-border: #29405e;
        --color-success: #3bc48d;
        --color-danger: #ff7a7a;
        --shadow-soft: 0 18px 36px rgba(0, 0, 0, 0.38);
      }

      html[data-theme='dark'],
      html[data-theme='dark'] body {
        background: var(--color-bg);
        color: var(--color-ink);
      }

      html[data-theme='dark'] .site-header,
      html[data-theme='dark'] .site-footer,
      html[data-theme='dark'] .panel,
      html[data-theme='dark'] .section-surface,
      html[data-theme='dark'] .modal-card,
      html[data-theme='dark'] .employee-page-panel,
      html[data-theme='dark'] .employee-modal-panel,
      html[data-theme='dark'] .finance-kpi,
      html[data-theme='dark'] .finance-chart-card,
      html[data-theme='dark'] .table-wrap,
      html[data-theme='dark'] .feedback,
      html[data-theme='dark'] input,
      html[data-theme='dark'] select,
      html[data-theme='dark'] textarea,
      html[data-theme='dark'] .data-table th,
      html[data-theme='dark'] .data-table td,
      html[data-theme='dark'] .finance-table-card,
      html[data-theme='dark'] .finance-remittance-table-card,
      html[data-theme='dark'] .finance-cashflow-ledger-card,
      html[data-theme='dark'] .finance-performance-stat,
      html[data-theme='dark'] .activity-summary-stat {
        background: var(--color-surface);
        color: var(--color-ink);
        border-color: var(--color-border);
      }

      html[data-theme='dark'] .data-table th,
      html[data-theme='dark'] .finance-overview-side,
      html[data-theme='dark'] .finance-performance-stat,
      html[data-theme='dark'] .activity-summary-stat,
      html[data-theme='dark'] .btn-secondary {
        background: var(--color-surface-soft);
      }

      html[data-theme='dark'] .site-nav a:not(.btn),
      html[data-theme='dark'] label,
      html[data-theme='dark'] p,
      html[data-theme='dark'] .nav-user,
      html[data-theme='dark'] .finance-kpi-label,
      html[data-theme='dark'] .finance-kpi-delta,
      html[data-theme='dark'] .activity-summary-label {
        color: var(--color-ink-soft);
      }

      html[data-theme='dark'] h1,
      html[data-theme='dark'] h2,
      html[data-theme='dark'] h3,
      html[data-theme='dark'] h4,
      html[data-theme='dark'] strong,
      html[data-theme='dark'] th,
      html[data-theme='dark'] td,
      html[data-theme='dark'] .brand-text,
      html[data-theme='dark'] .finance-kpi-value {
        color: var(--color-ink);
      }

      html[data-theme='dark'] .btn-primary {
        background: #2f76d2;
        border-color: #2f76d2;
        color: #fff;
      }

      html[data-theme='dark'] .btn-secondary {
        color: var(--color-ink);
        border-color: var(--color-border);
      }

      .site-theme-toggle {
        min-width: 42px;
        width: 42px;
        padding-inline: 0;
        font-size: 1.05rem;
      }
    </style>
<meta name="description" content="Codswallop fleet leaderboard and ship assignments." />

    <link rel="stylesheet" href="/assets/css/pages.css" />
  </head>
  <body class="page page-intranet page-fleet">

      <div class="container header-row">

      </div>
    </section>

    <script type="module" src="/assets/js/pages/fleet-page.js?v=20260308f"></script>
      <script>
      (function () {
        var KEY = 'frontier:theme-preference';

        function currentTheme() {
          try {
            return localStorage.getItem(KEY) === 'dark' ? 'dark' : 'light';
          } catch {
            return 'light';
          }
        }

        function applyTheme(theme) {
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
          document.body && document.body.setAttribute('data-theme', theme);
          var themeColor = document.querySelector('meta[name="theme-color"]');
          if (themeColor) themeColor.setAttribute('content', theme === 'dark' ? '#08111f' : '#112d72');
        }

                function updateButton(button, theme) {
          if (!button) return;
          var isDark = theme === 'dark';
          button.innerHTML = isDark
            ? '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>'
            : '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"></path></svg>';
          button.title = isDark ? 'Switch to light mode' : 'Switch to dark mode';
          button.setAttribute('aria-label', button.title);
          button.setAttribute('aria-pressed', isDark ? 'true' : 'false');
        }

        function ensureToggle() {
          var button = document.querySelector('.site-theme-toggle') || document.querySelector('.btn-theme-toggle');
          if (!button) return;
          if (button.dataset.themeBound !== '1') {
            button.dataset.themeBound = '1';
            button.addEventListener('click', function () {
              var next = currentTheme() === 'dark' ? 'light' : 'dark';
              try {
                localStorage.setItem(KEY, next);
              } catch {}
              applyTheme(next);
              updateButton(button, next);
            });
          }
          updateButton(button, currentTheme());
        }

        applyTheme(currentTheme());
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', ensureToggle, { once: true });
        } else {
          ensureToggle();
        }
      })();
    </script>
  </body>
  </html>
