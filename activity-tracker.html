<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <meta name="theme-color" content="#112d72" /><meta name="description" content="Frontier Oil & Gas Company activity tracker." />
    <title>Frontier Oil & Gas Company | Activity Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&display=swap" rel="stylesheet" />

      <link rel="stylesheet" href="/assets/dist/css/app.bundle.css?v=20260412010812" />
      <style>
        .activity-tracker-panel {
          padding: .9rem 1.05rem;
        }
        .activity-summary-grid {
          display: grid;
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: .6rem;
          margin-bottom: .65rem;
        }
        .activity-summary-stat {
          border: 1px solid var(--color-border);
          border-radius: 10px;
          padding: .5rem .7rem;
          background: #f8fbff;
        }
        .activity-summary-label {
          margin: 0 0 .1rem;
          font-size: .7rem;
          letter-spacing: .04em;
          text-transform: uppercase;
          color: var(--color-muted);
        }
        .activity-summary-value {
          display: block;
          font-size: 1.3rem;
          line-height: 1;
        }
        .activity-filter-grid {
          display: grid;
          grid-template-columns: repeat(6, minmax(0, 1fr));
          gap: .6rem;
          align-items: end;
        }
        .activity-filter-grid input,
        .activity-filter-grid select {
          margin-bottom: 0;
        }
        .activity-scope-toggle {
          display: flex;
          align-items: center;
          gap: .5rem;
          min-height: 40px;
          margin-top: .35rem;
        }
        .activity-scope-toggle input {
          width: auto;
          margin: 0;
        }
        .activity-advanced-row {
        }
        @media (max-width: 1200px) {
          .activity-summary-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
          }
          .activity-filter-grid {
            grid-template-columns: repeat(3, minmax(0, 1fr));
          }
        }
        @media (max-width: 760px) {
          .activity-summary-grid,
          .activity-filter-grid,
          .activity-advanced-grid {
            grid-template-columns: 1fr;
          }
        }
      </style>
  </head>
  <body class="page page-intranet">
    <header class="site-header">
      <div class="container header-row">
        <a class="brand" href="/">
          <span class="brand-mark brand-mark-image" aria-hidden="true"><img src="/assets/brand/frontierlogo.svg?v=20260325fix" alt="" loading="eager" decoding="async" /></span>
          <span class="brand-text">Frontier Oil &amp; Gas Company</span>
        </a>
        <nav class="site-nav" aria-label="Primary"></nav>
        <button type="button" class="btn btn-secondary site-theme-toggle btn-theme-toggle" aria-pressed="false">Dark Mode</button>
      </div>
    </header>

    <main class="section">
      <div class="container intranet-layout intranet-page-shell">
        <section class="panel my-details-page-header">
          <div>
            <h1>Activity Tracker</h1>
            <p class="my-details-subtitle">Employee voyage activity and quota tracking.</p>
          </div>
          <div class="button-row">
            <a class="btn btn-secondary" href="/admin/employees">Back to Employees</a>
            <button id="activityExportCsvBtn" class="btn btn-primary" type="button">Export CSV</button>
          </div>
          <div id="guardFeedback" class="feedback" role="status" aria-live="polite"></div>
          <div id="activityTrackerFeedback" class="feedback" role="status" aria-live="polite"></div>
        </section>

        <section id="protectedContent" class="hidden admin-employees-stack">
          <article class="panel activity-tracker-panel">
            <div id="activitySummaryGrid" class="activity-summary-grid"></div>
            <div class="activity-filter-grid">
              <div>
                <label for="activitySearch">Search</label>
                <input id="activitySearch" type="text" placeholder="Username or Roblox ID" />
              </div>
              <div>
                <label for="activityQuotaTarget">Quota Target</label>
                <input id="activityQuotaTarget" type="number" min="1" step="1" placeholder="e.g. 4" />
              </div>
              <div>
                <label for="activityQuotaFilter">Quota Filter</label>
                <select id="activityQuotaFilter">
                  <option value="">All</option>
                  <option value="met">Met quota</option>
                  <option value="not_met">Not met</option>
                </select>
              </div>
              <div>
                <label for="activityDateFrom">Date From</label>
                <input id="activityDateFrom" type="date" />
              </div>
              <div>
                <label for="activityDateTo">Date To</label>
                <input id="activityDateTo" type="date" />
              </div>
              <div>
                <label for="activityActiveOnly">Scope</label>
                <label class="activity-scope-toggle">
                  <input id="activityActiveOnly" type="checkbox" checked />
                  <span>Active staff only</span>
                </label>
              </div>
            </div>
          </article>

          <article class="panel">
            <div class="table-wrap">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Username</th>
                    <th>Rank</th>
                    <th>Status</th>
                    <th>Completed</th>
                    <th>Target</th>
                    <th>OOTW / Crew</th>
                    <th>Last Ended Voyage</th>
                    <th>Days Idle</th>
                  </tr>
                </thead>
                <tbody id="activityTrackerBody"></tbody>
              </table>
            </div>
            <div class="pagination-row">
              <div class="button-row">
                <button id="activityPrevPageBtn" class="btn btn-secondary" type="button">Previous</button>
                <button id="activityNextPageBtn" class="btn btn-secondary" type="button">Next</button>
              </div>
              <span id="activityPaginationInfo" class="pagination-info">Page 1 of 1</span>
            </div>
          </article>
        </section>
      </div>
    </main>
    <script type="module" src="/assets/dist/js/activity-tracker-page.bundle.js?v=20260412002134"></script>
      <script>
      (function () {
        var KEY = 'frontier:theme-preference';

        function currentTheme() {
          try {
            return localStorage.getItem(KEY) === 'dark' ? 'dark' : 'light';
          } catch {
            return 'light';
          }
        }

        function applyTheme(theme) {
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
          document.body && document.body.setAttribute('data-theme', theme);
          var themeColor = document.querySelector('meta[name="theme-color"]');
          if (themeColor) themeColor.setAttribute('content', theme === 'dark' ? '#08111f' : '#112d72');
        }

        function updateButton(button, theme) {
          if (!button) return;
          var isDark = theme === 'dark';
          button.textContent = isDark ? 'Light Mode' : 'Dark Mode';
          button.title = isDark ? 'Switch to light mode' : 'Switch to dark mode';
          button.setAttribute('aria-pressed', isDark ? 'true' : 'false');
        }

        function ensureToggle() {
          var button = document.querySelector('.site-theme-toggle') || document.querySelector('.btn-theme-toggle');
          if (!button) return;
          if (button.dataset.themeBound !== '1') {
            button.dataset.themeBound = '1';
            button.addEventListener('click', function () {
              var next = currentTheme() === 'dark' ? 'light' : 'dark';
              try {
                localStorage.setItem(KEY, next);
              } catch {}
              applyTheme(next);
              updateButton(button, next);
            });
          }
          updateButton(button, currentTheme());
        }

        applyTheme(currentTheme());
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', ensureToggle, { once: true });
        } else {
          ensureToggle();
        }
        new MutationObserver(ensureToggle).observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
