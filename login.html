<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <meta name="theme-color" content="#112d72" /><meta name="description" content="Sign in to Frontier Oil & Gas Company intranet." />
    <title>Frontier Oil & Gas Company | Login</title>
    <link rel="icon" type="image/svg+xml" href="/assets/brand/favicon.svg?v=20260325fix" />
    <link rel="shortcut icon" href="/assets/brand/favicon.svg?v=20260325fix" />
    <link rel="apple-touch-icon" href="/assets/brand/favicon.svg?v=20260325fix" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />




      <link rel="stylesheet" href="/assets/dist/css/app.bundle.css?v=20260412010812" />
  </head>
  <body class="page page-login">
    <header class="site-header">
      <div class="container header-row">
        <a class="brand" href="/login">
          <span class="brand-mark brand-mark-image" aria-hidden="true"><img src="/assets/brand/frontierlogo.svg?v=20260325fix" alt="" loading="eager" decoding="async" /></span>
          <span class="brand-text">Frontier Oil &amp; Gas Company</span>
        </a>
        <nav class="site-nav" aria-label="Primary"></nav>
        <button type="button" class="btn btn-secondary site-theme-toggle btn-theme-toggle" aria-pressed="false">Dark Mode</button>
      </div>
    </header>

    <main class="login-page section">
      <div class="container login-cluster">
        <div class="login-shell">
          <section class="panel login-card">
            <div id="authPanel">
              <span class="eyebrow">Frontier Oil & Gas Company Intranet</span>
              <h1>Sign In</h1>
              <p class="lead">Login to access voyage operations, finance tracking, and admin tools.</p>
              <div id="loginFeedback" class="feedback" role="status" aria-live="polite"></div>
              <button id="discordLoginBtn" type="button" class="btn btn-primary btn-block">
                <span data-login-label>Login with Discord</span>
                <span data-login-spinner class="login-spinner hidden" aria-hidden="true"></span>
              </button>
              <div class="login-helper">
                Use your staff Discord account. If access fails, ask an admin to map your role in
                <strong>Admin Panel &rarr; User Groups</strong>.
              </div>
              <div class="login-meta" aria-hidden="true">
                <span class="login-meta-pill">Secure Session</span>
                <span class="login-meta-pill">Role-Based Access</span>
                <span class="login-meta-pill">Fast Sign-In</span>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script type="module" src="/assets/dist/js/intranet-page.bundle.js?v=20260325144816"></script>
      <script>
      (function () {
        var KEY = 'frontier:theme-preference';

        function currentTheme() {
          try {
            return localStorage.getItem(KEY) === 'dark' ? 'dark' : 'light';
          } catch {
            return 'light';
          }
        }

        function applyTheme(theme) {
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
          document.body && document.body.setAttribute('data-theme', theme);
          var themeColor = document.querySelector('meta[name="theme-color"]');
          if (themeColor) themeColor.setAttribute('content', theme === 'dark' ? '#08111f' : '#112d72');
        }

        function updateButton(button, theme) {
          if (!button) return;
          var isDark = theme === 'dark';
          button.textContent = isDark ? 'Light Mode' : 'Dark Mode';
          button.title = isDark ? 'Switch to light mode' : 'Switch to dark mode';
          button.setAttribute('aria-pressed', isDark ? 'true' : 'false');
        }

        function ensureToggle() {
          var button = document.querySelector('.site-theme-toggle') || document.querySelector('.btn-theme-toggle');
          if (!button) return;
          if (button.dataset.themeBound !== '1') {
            button.dataset.themeBound = '1';
            button.addEventListener('click', function () {
              var next = currentTheme() === 'dark' ? 'light' : 'dark';
              try {
                localStorage.setItem(KEY, next);
              } catch {}
              applyTheme(next);
              updateButton(button, next);
            });
          }
          updateButton(button, currentTheme());
        }

        applyTheme(currentTheme());
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', ensureToggle, { once: true });
        } else {
          ensureToggle();
        }
        new MutationObserver(ensureToggle).observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
