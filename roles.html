<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <meta name="theme-color" content="#112d72" /><meta name="description" content="Frontier Oil & Gas Company user groups management." />
    <title>Frontier Oil & Gas Company | User Groups</title>
    <link rel="icon" type="image/svg+xml" href="/assets/brand/favicon.svg?v=20260325fix" />
    <link rel="shortcut icon" href="/assets/brand/favicon.svg?v=20260325fix" />
    <link rel="apple-touch-icon" href="/assets/brand/favicon.svg?v=20260325fix" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />



      <link rel="stylesheet" href="/assets/dist/css/app.bundle.css?v=20260412010812" />
  </head>
  <body class="page page-intranet">
    <header class="site-header">
      <div class="container header-row">
        <a class="brand" href="/">
          <span class="brand-mark brand-mark-image" aria-hidden="true"><img src="/assets/brand/frontierlogo.svg?v=20260325fix" alt="" loading="eager" decoding="async" /></span>
          <span class="brand-text">Frontier Oil &amp; Gas Company</span>
        </a>
        <nav class="site-nav" aria-label="Primary"></nav>
        <button type="button" class="btn btn-secondary site-theme-toggle btn-theme-toggle" aria-pressed="false">Dark Mode</button>
      </div>
    </header>

    <main class="section">
      <div class="container intranet-layout">
        <section class="panel">
          <div class="modal-header">
            <h1>User Groups</h1>
            <a class="btn btn-secondary" href="/admin-panel">&larr; Back to Admin Panel</a>
          </div>
          <div id="guardFeedback" class="feedback" role="status" aria-live="polite"></div>
          <div id="rolesFeedback" class="feedback" role="status" aria-live="polite"></div>
        </section>

        <section id="protectedContent" class="hidden">
          <article class="panel roles-layout">
            <section class="roles-list-panel">
              <div class="modal-header">
                <h2>User Groups</h2>
                <button id="openCreateRoleBtn" class="btn btn-primary" type="button">+ Create Group</button>
              </div>
              <ul id="rolesList" class="role-list"></ul>
            </section>

            <section class="roles-details-panel">
              <h2>Group Details</h2>
              <p id="selectedRoleHint">Select a user group to edit permissions.</p>
              <form id="roleDetailsForm" class="hidden">
                <input type="hidden" name="id" />
                <label>Group Name</label>
                <input name="name" type="text" required />
                <label>Description</label>
                <textarea name="description" rows="3"></textarea>
                <label>Discord Role ID (optional)</label>
                <input name="discordRoleId" type="text" inputmode="numeric" placeholder="e.g. 123456789012345678" />

                <h3>Permissions</h3>
                <div id="permissionsEditor" class="permissions-grid permissions-grid-scroll"></div>

                <h3>Group Members</h3>
                <div class="roles-members-panel">
                  <div class="roles-members-add">
                    <input id="roleMemberSearchInput" type="search" placeholder="Search employee username..." />
                    <button id="roleMemberSearchBtn" class="btn btn-secondary" type="button">Search</button>
                  </div>
                  <div id="roleMemberCandidates" class="roles-members-candidates"></div>
                  <div id="roleMembersList" class="roles-members-list"></div>
                </div>

                <div class="modal-actions">
                  <button class="btn btn-primary" type="submit">Save Changes</button>
                  <button id="cloneRoleBtn" class="btn btn-secondary" type="button">Clone Role</button>
                  <button id="deleteRoleBtn" class="btn btn-danger" type="button">Delete Group</button>
                </div>
              </form>
            </section>
          </article>
        </section>
      </div>
    </main>

    <section id="createRoleModal" class="modal-overlay hidden" aria-hidden="true">
      <div class="modal-card">
        <div class="modal-header">
          <h2>Create Group</h2>
          <button class="btn btn-secondary" type="button" data-close-modal="createRoleModal">Close</button>
        </div>
        <form id="createRoleForm">
          <label>Group Name</label>
          <input name="name" type="text" required />
          <label>Description</label>
          <textarea name="description" rows="3"></textarea>
          <label>Discord Role ID (optional)</label>
          <input name="discordRoleId" type="text" inputmode="numeric" placeholder="e.g. 123456789012345678" />
          <div class="modal-actions">
            <button class="btn btn-primary" type="submit">Create Group</button>
            <button class="btn btn-secondary" type="button" data-close-modal="createRoleModal">Cancel</button>
          </div>
        </form>
      </div>
    </section>
    <script type="module" src="/assets/dist/js/roles-page.bundle.js?v=20260325144816"></script>
      <script>
      (function () {
        var KEY = 'frontier:theme-preference';

        function currentTheme() {
          try {
            return localStorage.getItem(KEY) === 'dark' ? 'dark' : 'light';
          } catch {
            return 'light';
          }
        }

        function applyTheme(theme) {
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
          document.body && document.body.setAttribute('data-theme', theme);
          var themeColor = document.querySelector('meta[name="theme-color"]');
          if (themeColor) themeColor.setAttribute('content', theme === 'dark' ? '#08111f' : '#112d72');
        }

        function updateButton(button, theme) {
          if (!button) return;
          var isDark = theme === 'dark';
          button.textContent = isDark ? 'Light Mode' : 'Dark Mode';
          button.title = isDark ? 'Switch to light mode' : 'Switch to dark mode';
          button.setAttribute('aria-pressed', isDark ? 'true' : 'false');
        }

        function ensureToggle() {
          var button = document.querySelector('.site-theme-toggle') || document.querySelector('.btn-theme-toggle');
          if (!button) return;
          if (button.dataset.themeBound !== '1') {
            button.dataset.themeBound = '1';
            button.addEventListener('click', function () {
              var next = currentTheme() === 'dark' ? 'light' : 'dark';
              try {
                localStorage.setItem(KEY, next);
              } catch {}
              applyTheme(next);
              updateButton(button, next);
            });
          }
          updateButton(button, currentTheme());
        }

        applyTheme(currentTheme());
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', ensureToggle, { once: true });
        } else {
          ensureToggle();
        }
        new MutationObserver(ensureToggle).observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
